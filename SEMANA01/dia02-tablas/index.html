<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title>
</head>
<body>
    
    <h2>Tabla básica</h2>

    <table border>
        <tr>
            <th>fila 1, celda 1</th>
            <th>fila 1, celda 2</th>
            <th>fila 1, celda 3</th>
        </tr>
        <tr>
            <td>fila 2, celda 1</td>
            <td>fila 2, celda 2</td>
            <td>fila 2, celda 3</td>
        </tr>
        <tr>
            <td>fila 3, celda 1</td>
            <td>fila 3, celda 2</td>
            <td>fila 3, celda 3</td>
        </tr>
        <tr>
            <td>fila 4, celda 1</td>
            <td>fila 4, celda 2</td>
            <td>fila 4, celda 3</td>
        </tr>
        <tr>
            <td colspan="2">Celda que abarca 2 columnas</td>
            <td rowspan="2">Celda que abarca 2 filas</td>
        </tr>
        <tr>
            <td>fila 6, celda 1</td>
            <td>fila 6, celda 2</td>
        </tr>
        
    </table>


</body>
</html>
